<!DOCTYPE html>
<html>
<head>
  <title>Editor de Imagens para Daltônicos</title>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f7f7f7;
    }

    h1 {
      margin-top: 50px;
    }

    #upload-container {
      margin-top: 50px;
    }

    .button {
      display: inline-block;
      padding: 10px 20px;
      background-color: #007bff;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #image-container {
      margin-top: 50px;
    }

    #image-preview {
      max-width: 500px;
      max-height: 500px;
      border: 2px solid #ccc;
      border-radius: 5px;
      box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
    }

    #color-sliders {
      margin-top: 50px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .color-slider {
      margin: 0 10px;
    }

    .color-slider input[type="range"] {
      width: 200px;
    }

    .color-slider label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Editor de Imagens para Daltônicos</h1>
  <div id="upload-container">
    <label for="upload" class="button">Selecionar Imagem</label>
    <input type="file" id="upload" accept="image/*">
    <br>
    <label for="image-url">URL da Imagem:</label>
    <input type="text" id="image-url">
    <button id="load-image" class="button">Carregar</button>
  </div>
  <div id="image-container">
    <img id="image-preview">
  </div>
  <div id="color-sliders">
    <div class="color-slider">
      <label for="red-slider">Vermelho</label>
      <input type="range" min="0" max="255" step="1" value="0" id="red-slider">
    </div>
    <div class="color-slider">
      <label for="green-slider">Verde</label>
      <input type="range" min="0" max="255" step="1" value="0" id="green-slider">
    </div>
    <div class="color-slider">
      <label for="blue-slider">Azul</label>
      <input type="range" min="0" max="255" step="1" value="0" id="blue-slider">
    </div>
  </div>
  <script>
    // Seu código JavaScript existente
  </script>
</body>
</html>
