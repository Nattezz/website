        }
        
        .container {
            max-width: 600px;

            background-color: #fff;
            border-radius: 5px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);

        label {

        }
        
        input[type="range"] {

        }
        
        #imageUrl {

            border-radius: 4px;

        }
        
        #updateButton {

            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;

            font-size: 16px;
            margin-top: 10px;
        }
        
        img {
            display: block;
            max-width: 100%;
            height: auto;
            margin-top: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);

    </style>
</head>
