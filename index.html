<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Editor de Imagens</title>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        font-family: Arial, sans-serif;
      }
      
      h1 {
        margin-top: 30px;
      }

      #imagem {
        max-width: 500px;
        max-height: 500px;
        margin-top: 30px;
        border: 2px solid #333;
        border-radius: 5px;
        box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
      }

      .medidor {
        margin-top: 20px;
        width: 300px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .medidor input[type="range"] {
        width: 100%;
      }

      .medidor label {
        margin-top: 10px;
        font-size: 16px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Editor de Imagens</h1>
    <input type="file" id="input-imagem">
    <img id="imagem">
    <div class="medidor">
      <input type="range" min="0" max="255" value="0" id="medidor-vermelho">
      <label for="medidor-vermelho">Vermelho</label>
    </div>
    <div class="medidor">
      <input type="range" min="0" max="255" value="0" id="medidor-verde">
      <label for="medidor-verde">Verde</label>
    </div>
    <div class="medidor">
      <input type="range" min="0" max="255" value="0" id="medidor-azul">
      <label for="medidor-azul">Azul</label>
    </div>
    <script>
      const inputImagem = document.getElementById('input-imagem');
      const imagem = document.getElementById('imagem');
      const medidorVermelho = document.getElementById('medidor-vermelho');
      const medidorVerde = document.getElementById('medidor-verde');
      const medidorAzul = document.getElementById('medidor-azul');

      inputImagem.addEventListener('change', function() {
        const file = inputImagem.files[0];
        const reader = new FileReader();
        reader.addEventListener('load', function() {
          imagem.src = reader.result;
        });
        reader.readAsDataURL(file);
      });

      function atualizarCor() {
        const vermelho = medidorVermelho.value;
        const verde = medidorVerde.value;
        const azul = medidorAzul.value;
        imagem.style.filter = `rgb(${vermelho}%, ${verde}%, ${azul}%)`;
      }

      medidorVermelho.addEventListener('input', atualizarCor);
      medidorVerde.addEventListener('input', atualizarCor);
      medidorAzul.addEventListener('input', atualizarCor);
    </script>
  </body>
</html>
