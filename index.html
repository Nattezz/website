<!DOCTYPE html>
<html>
  <head>
    <title>Selecionar e alterar cores de imagem</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>
  <body>
    <div id="image-container">
      <img id="selected-image" src="#" alt="Selecione uma imagem">
    </div>
    <div id="color-sliders">
      <div class="color-slider red">
        <label for="red-slider">Vermelho</label>
        <input type="range" min="0" max="255" value="0" id="red-slider">
      </div>
      <div class="color-slider green">
        <label for="green-slider">Verde</label>
        <input type="range" min="0" max="255" value="0" id="green-slider">
      </div>
      <div class="color-slider blue">
        <label for="blue-slider">Azul</label>
        <input type="range" min="0" max="255" value="0" id="blue-slider">
      </div>
    </div>
    <link rel="stylesheet" href="style.css">
  </body>
</html>
